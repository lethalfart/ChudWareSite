<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChudWare</title>
    <meta
      name="description"
      content="Official ChudWare portal: download releases, join Discord, and explore source code."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="rain" aria-hidden="true"></div>
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>

    <header class="hero wrap">
      <img class="logo" src="logo.png" alt="ChudWare logo" />
      <p class="eyebrow">Official Project Hub</p>
      <h1>ChudWare</h1>
      <p class="hero-copy">
        ChudWare is a Forge-based Minecraft client for version 1.8.9. It is free and
        fully open source, and will be forever.
      </p>
      <p class="hero-copy">
        Download the latest release here, and click the logos below to access the discord and see src.
      </p>
      <a id="primary-download" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">
        Download Latest
      </a>
    </header>

    <main class="wrap logo-links">
      <a class="logo-link" id="discord-logo-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Join ChudWare Discord">
        <img src="discord-black-icon-1.png" alt="Discord logo" />
      </a>
      <a class="logo-link" id="source-logo-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="View ChudWare source code">
        <img src="sourcelogo.png" alt="Source code logo" />
      </a>
    </main>

    <footer class="wrap footer">
      <p>© <span id="year"></span> ChudWare. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
