<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChudWare Modules</title>
    <meta
      name="description"
      content="ChudWare module list: AimAssist, AutoClicker, ESP, FullBright, and more."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio id="bg-music" loop preload="auto">
      <source src="background-music.mp3" type="audio/mpeg" />
    </audio>

    <button
      id="music-toggle"
      class="music-toggle"
      type="button"
      aria-label="Mute background music"
      title="Mute background music"
    >
      <span id="music-icon" aria-hidden="true">🔊</span>
    </button>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="rain" aria-hidden="true"></div>
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>

    <header class="hero wrap modules-page">
      <nav class="tabs" aria-label="Primary">
        <a class="tab-link" href="index.html">Home</a>
        <a class="tab-link active" href="modules.html">Modules</a>
      </nav>
      <img class="logo" src="logo.png" alt="ChudWare logo" />
      <p class="eyebrow">ChudWare</p>
      <h1>Modules</h1>
      <p class="hero-copy">Current modules available in ChudWare.</p>
    </header>

    <main class="wrap modules-list" aria-label="Module list">
      <div class="module-chip">AimAssist</div>
      <div class="module-chip">ArrayList</div>
      <div class="module-chip">AutoBridge</div>
      <div class="module-chip">AutoClicker</div>
      <div class="module-chip">Chams</div>
      <div class="module-chip">ESP</div>
      <div class="module-chip">FullBright</div>
      <div class="module-chip">Reach</div>
      <div class="module-chip">Velocity</div>
    </main>

    <footer class="wrap footer">
      <p>© <span id="year"></span> ChudWare. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
